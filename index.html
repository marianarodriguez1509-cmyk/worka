<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Colaborador</title>
</head>
<body style="margin: 0; font-family: sans-serif; background-color: #E7C196;">

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background-color: #382417; color: #E7C196;">
        <div style="font-weight: bold; font-size: 1.5rem;">LOGO</div>
        <div style="display: flex; gap: 20px;">
            <a href="#" style="color: #E7C196; text-decoration: none;">Nosotros</a>
            <a href="#" style="color: #E7C196; text-decoration: none;">Servicios</a>
            <a href="#" style="color: #E7C196; text-decoration: none;">Contacto</a>
        </div>
        <div style="font-weight: bold; cursor: pointer;">LOGIN</div>
    </nav>

    <header style="display: flex; gap: 20px; padding: 40px 5%; background-color: #6D3C1C; color: white;">
        <div style="flex: 1; padding: 20px; border: 2px solid #C57938; border-radius: 8px;">
            <h2>Texto del banner</h2>
            <p>Bienvenido al espacio exclusivo para nuestros colaboradores.</p>
        </div>
        <div style="flex: 1; display: flex; justify-content: center; align-items: center; border: 2px solid #C57938; border-radius: 8px; min-height: 200px;">
            Imagen del banner
        </div>
    </header>

    <main style="padding: 40px 5%; display: flex; gap: 20px; align-items: flex-start;">
        
        <div style="width: 150px; height: 150px; background-color: #C57938; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-align: center; color: white; padding: 10px; font-weight: bold; border: 4px solid #382417;">
            Descuento por suscribirse
        </div>

        <div style="flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
            <div style="background: #382417; color: #E7C196; padding: 30px; text-align: center; border-radius: 8px; border: 2px solid #C57938;">Gestión de tiempo</div>
            <div style="background: #382417; color: #E7C196; padding: 30px; text-align: center; border-radius: 8px; border: 2px solid #C57938;">Nómina y beneficios</div>
            <div style="background: #382417; color: #E7C196; padding: 30px; text-align: center; border-radius: 8px; border: 2px solid #C57938;">Capacitación</div>
        </div>
    </main>

    <footer style="background-color: #382417; color: #E7C196; padding: 20px; text-align: center;">
        <p>Soporte: Mariana Cataño Rodriguez | Cel: 310457716 | <a href="mailto:marianarodriguez1509@gmail.com" style="color: #C57938;">marianarodriguez1509@gmail.com</a></p>
    </footer>

</body>
</html>
